# Alembic Configuration File
# the format used is the generic INI file format with `key/value` pairs,
# if you want to use non-ASCII characters in any of the string values, please see the
# "The value to use for the "encoding" key" section.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %(rev)s_%%(slug)0,8d
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)0,8d

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in filename, or -1 to read all in.
# When the length is trimmed, the guid is unique per
# second. A value of -1 will cause each revision to be
# distinct for all time
# truncate_slug_length = -1

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Loggers to configure in logging config.
#loggers = sqlalchemy.engine,sqlalchemy.pool

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# the output encoding used when revision files
# are written from script.py_mako.py to the versions/ directory.
# we use utf-8 as default and set to utf-8 by default assuming a utf that the
# operating system can recognize in its default settings.  any custom encoding markers
# inside the migration file when created by revision_environment True and then specify
# encoding = latin1 before executing the alembic revision command
sqlalchemy.url = driver://user:password@localhost/dbname
