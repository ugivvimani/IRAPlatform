version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ira-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ira_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ira_password}
      POSTGRES_DB: ${DB_NAME:-ira_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ira_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ira-network

  # Redis for caching and task queues
  redis:
    image: redis:7-alpine
    container_name: ira-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ira-network

  # IRA Agent API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ira-api
    environment:
      DB_BACKEND: ${DB_BACKEND:-postgres}
      POSTGRES_DSN: postgresql://${DB_USER:-ira_user}:${DB_PASSWORD:-ira_password}@postgres:5432/${DB_NAME:-ira_db}
      SQLITE_DB_PATH: /data/ira.db
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      ESG_API_KEY: ${ESG_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ira_data:/data
    networks:
      - ira-network
    restart: unless-stopped

  # Celery Worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ira-worker
    command: celery -A app.tasks worker --loglevel=info
    environment:
      DB_BACKEND: ${DB_BACKEND:-postgres}
      POSTGRES_DSN: postgresql://${DB_USER:-ira_user}:${DB_PASSWORD:-ira_password}@postgres:5432/${DB_NAME:-ira_db}
      REDIS_URL: redis://redis:6379
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - ira-network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: ira-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ira-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ira-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - ira-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ira_data:
  prometheus_data:
  grafana_data:

networks:
  ira-network:
    driver: bridge
