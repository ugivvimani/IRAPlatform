apiVersion: v1
kind: Namespace
metadata:
  name: ira-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ira-config
  namespace: ira-system
data:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  DB_BACKEND: "postgres"
  EMBEDDING_TYPE: "hybrid"
---
apiVersion: v1
kind: Secret
metadata:
  name: ira-secrets
  namespace: ira-system
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  OPENAI_API_KEY: ""
  PINECONE_API_KEY: ""
  NEWS_API_KEY: ""
  ESG_API_KEY: ""
  DB_PASSWORD: "postgres-password-change-me"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: ira-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ira-logs
  namespace: ira-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ira-api
  namespace: ira-system
  labels:
    app: ira
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ira
      component: api
  template:
    metadata:
      labels:
        app: ira
        component: api
    spec:
      serviceAccountName: ira-api
      containers:
      - name: api
        image: ghcr.io/ugivvimani/iraplatform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DB_BACKEND
          valueFrom:
            configMapKeyRef:
              name: ira-config
              key: DB_BACKEND
        - name: POSTGRES_DSN
          value: "postgresql://ira_user:$(DB_PASSWORD)@postgres:5432/ira_db"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ira-secrets
              key: DB_PASSWORD
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ira-secrets
              key: OPENAI_API_KEY
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ira-secrets
              key: PINECONE_API_KEY
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ira-config
              key: LOG_LEVEL
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: ira-logs
---
apiVersion: v1
kind: Service
metadata:
  name: ira-api
  namespace: ira-system
  labels:
    app: ira
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: ira
    component: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ira-api-hpa
  namespace: ira-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ira-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ira-ingress
  namespace: ira-system
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.example.com
    secretName: ira-tls
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ira-api
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ira-api
  namespace: ira-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ira-api
  namespace: ira-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ira-api
  namespace: ira-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ira-api
subjects:
- kind: ServiceAccount
  name: ira-api
  namespace: ira-system
