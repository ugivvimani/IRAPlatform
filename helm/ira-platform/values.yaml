replicaCount: 3

image:
  repository: ghcr.io/ugivvimani/iraplatform
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ira-tls
      hosts:
        - api.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

env:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  DB_BACKEND: "postgres"
  EMBEDDING_TYPE: "hybrid"
  CONNECTOR_TIMEOUT_SECONDS: "30"
  CONNECTOR_MAX_RETRIES: "3"

secrets:
  SECRET_KEY: "change-me-in-production"
  OPENAI_API_KEY: ""
  PINECONE_API_KEY: ""
  NEWS_API_KEY: ""
  ESG_API_KEY: ""
  OFAC_API_KEY: ""
  REUTERS_API_KEY: ""
  DB_PASSWORD: "postgres-password-change-me"
  ADMIN_API_KEY: ""
  ANALYST_API_KEY: ""
  VIEWER_API_KEY: ""

postgresql:
  enabled: true
  auth:
    username: ira_user
    password: postgres-password-change-me
    database: ira_db
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: false

monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
